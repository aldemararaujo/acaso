<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Lançamento de Dados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dice-container {
            perspective: 1000px;
            width: 50px;
            height: 50px;
        }
        @media (min-width: 640px) {
            .dice-container { width: 60px; height: 60px; }
        }
        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 4px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .dot {
            background-color: #1e293b;
            border-radius: 50%;
            width: 6px;
            height: 6px;
            margin: auto;
        }
        @media (min-width: 640px) {
            .dot { width: 8px; height: 8px; }
        }
        
        .face-1 { transform: rotateY(0deg) translateZ(25px); }
        .face-2 { transform: rotateY(90deg) translateZ(25px); }
        .face-3 { transform: rotateY(180deg) translateZ(25px); }
        .face-4 { transform: rotateY(-90deg) translateZ(25px); }
        .face-5 { transform: rotateX(90deg) translateZ(25px); }
        .face-6 { transform: rotateX(-90deg) translateZ(25px); }

        @media (min-width: 640px) {
            .face-1 { transform: rotateY(0deg) translateZ(30px); }
            .face-2 { transform: rotateY(90deg) translateZ(30px); }
            .face-3 { transform: rotateY(180deg) translateZ(30px); }
            .face-4 { transform: rotateY(-90deg) translateZ(30px); }
            .face-5 { transform: rotateX(90deg) translateZ(30px); }
            .face-6 { transform: rotateX(-90deg) translateZ(30px); }
        }

        .rolling {
            animation: spin 0.3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .bar-transition {
            transition: height 0.3s ease-out;
        }

        #history-line {
            display: flex;
            gap: 0.5rem;
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent);
        }

        .history-item {
            flex-shrink: 0;
            animation: slideFromLeft 0.3s ease-out forwards;
            background: #4f46e5;
            color: white;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 1rem;
        }

        @keyframes slideFromLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .stat-label-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-width: 0;
            flex: 1;
        }

        .val-main { font-weight: 800; color: #1e293b; font-size: 10px; }
        .val-freq { font-weight: 600; color: #4f46e5; font-size: 8px; }
        .val-pct { color: #64748b; font-size: 7px; line-height: 1; }

        @media (min-width: 640px) {
            .val-main { font-size: 12px; }
            .val-freq { font-size: 10px; }
            .val-pct { font-size: 9px; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-6 md:mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 text-balance">Simulador Estatístico de Dados</h1>
            <p class="text-slate-600 text-sm md:text-base px-4">Analise frequências e probabilidades através do lançamento de múltiplos dados.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-8">
            <!-- Painel de Controles Compacto -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-800 mb-3 border-b pb-1 text-sm uppercase tracking-wider">Configurações</h2>
                    
                    <div class="space-y-4">
                        <!-- Quantidade de Dados (Padrao 2) -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-semibold text-slate-600">Qtd. Dados (1-10):</label>
                                <input type="number" id="num-dice" min="1" max="10" value="2" class="w-12 p-1 border rounded text-center font-bold text-sm">
                            </div>
                            <input type="range" id="range-dice" min="1" max="10" value="2" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                        
                        <!-- Lançamentos (Padrao 10) -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-semibold text-slate-600">Lançamentos:</label>
                                <input type="number" id="num-rolls" min="1" max="10000" value="10" class="w-20 p-1 border rounded text-center font-bold text-sm">
                            </div>
                            <input type="range" id="range-rolls" min="1" max="10000" step="10" value="10" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>

                        <!-- Velocidade (Padrao 3) -->
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-semibold text-slate-600">Velocidade:</label>
                            <input type="range" id="input-speed" min="1" max="10" value="3" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            <div class="flex justify-between text-[8px] text-slate-400 font-bold uppercase">
                                <span>Lento</span>
                                <span>Rápido</span>
                            </div>
                        </div>

                        <div class="pt-2 grid grid-cols-2 gap-2">
                            <button id="btn-start" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-1 rounded-xl transition shadow-md text-xs">
                                Sortear
                            </button>
                            <button id="btn-reset" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 px-1 rounded-xl transition text-xs">
                                Reiniciar
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Progresso Compacto -->
                <div id="stats-panel" class="bg-indigo-900 p-4 rounded-2xl shadow-lg text-white hidden">
                    <h3 class="text-indigo-300 text-[10px] font-bold uppercase tracking-wider mb-1">Status</h3>
                    <div class="text-xl font-mono font-bold leading-none"><span id="current-count">0</span> / <span id="total-target">0</span></div>
                    <div class="mt-3 h-1.5 bg-indigo-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-400 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Visualização -->
            <div class="lg:col-span-3 space-y-4 md:space-y-6">
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                    <!-- Área dos Dados -->
                    <div class="min-h-[80px] md:min-h-[100px] flex flex-wrap justify-center items-center gap-4 md:gap-6 mb-4 w-full" id="dice-display">
                    </div>
                    
                    <!-- Histórico Caminhante -->
                    <div class="w-full border-t border-slate-50 pt-4 overflow-hidden">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] uppercase font-bold text-slate-400 shrink-0">Histórico:</span>
                            <div id="history-line" class="flex-1">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Gráfico -->
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm md:text-base">Distribuição por Soma</h3>
                    <div class="w-full overflow-hidden">
                        <div id="chart-container" class="h-48 md:h-64 flex items-end gap-1 px-1 border-b border-slate-200 mb-2 overflow-hidden">
                        </div>
                        <div id="labels-container" class="flex gap-1 px-1 items-start">
                        </div>
                    </div>
                </div>

                <!-- Tabela e Exportação -->
                <div id="full-history-section" class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b pb-4">
                        <div class="flex items-center gap-3">
                            <h3 class="font-bold text-slate-800 text-lg">Histórico Completo</h3>
                            <span id="history-count-badge" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-full">0 lançamentos</span>
                        </div>
                        <button id="btn-export" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Exportar CSV
                        </button>
                    </div>
                    
                    <div id="history-table-container" class="max-h-[300px] overflow-y-auto scrollbar-thin scrollbar-thumb-slate-200">
                        <table class="w-full text-left text-sm">
                            <thead class="text-slate-500 sticky top-0 bg-white">
                                <tr>
                                    <th class="py-2 px-4 border-b">#</th>
                                    <th class="py-2 px-4 border-b">Dados Individuais</th>
                                    <th class="py-2 px-4 border-b font-bold text-indigo-600">Soma Total</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body" class="text-slate-700">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const diceDisplay = document.getElementById('dice-display');
        const historyLine = document.getElementById('history-line');
        const chartContainer = document.getElementById('chart-container');
        const labelsContainer = document.getElementById('labels-container');
        const btnStart = document.getElementById('btn-start');
        const btnReset = document.getElementById('btn-reset');
        const btnExport = document.getElementById('btn-export');
        const historyTableBody = document.getElementById('history-table-body');
        const fullHistorySection = document.getElementById('full-history-section');
        const historyCountBadge = document.getElementById('history-count-badge');
        
        const numDiceInput = document.getElementById('num-dice');
        const rangeDiceInput = document.getElementById('range-dice');
        const numRollsInput = document.getElementById('num-rolls');
        const rangeRollsInput = document.getElementById('range-rolls');
        const speedInput = document.getElementById('input-speed');
        
        const statsPanel = document.getElementById('stats-panel');
        const currentCountDisplay = document.getElementById('current-count');
        const totalTargetDisplay = document.getElementById('total-target');
        const progressBar = document.getElementById('progress-bar');

        let isRunning = false;
        let frequencies = {};
        let totalRollsDone = 0;
        let timer = null;
        let fullHistoryData = [];

        function syncInputs(input, range) {
            input.addEventListener('input', () => { 
                let v = parseInt(input.value);
                if(v > parseInt(input.max)) v = parseInt(input.max);
                if(v < parseInt(input.min)) v = parseInt(input.min);
                input.value = v;
                range.value = v; 
                setupSimulation(); 
            });
            range.addEventListener('input', () => { 
                input.value = range.value; 
                setupSimulation(); 
            });
        }
        syncInputs(numDiceInput, rangeDiceInput);
        syncInputs(numRollsInput, rangeRollsInput);

        function setupSimulation() {
            if (isRunning) return;
            const diceCount = parseInt(numDiceInput.value);
            const minSum = diceCount;
            const maxSum = diceCount * 6;
            
            frequencies = {};
            for (let i = minSum; i <= maxSum; i++) frequencies[i] = 0;
            
            totalRollsDone = 0;
            fullHistoryData = [];
            historyLine.innerHTML = '';
            historyTableBody.innerHTML = '';
            fullHistorySection.classList.add('hidden');
            updateStatsUI();
            renderEmptyChart(minSum, maxSum);
            renderDicePlaceholders(diceCount);
        }

        function renderDicePlaceholders(count) {
            diceDisplay.innerHTML = '';
            for (let i = 0; i < count; i++) {
                diceDisplay.innerHTML += `
                    <div class="dice-container">
                        <div class="dice" id="dice-${i}">
                            ${createFaceHTML(1, 'face-1')}
                            ${createFaceHTML(2, 'face-2')}
                            ${createFaceHTML(3, 'face-3')}
                            ${createFaceHTML(4, 'face-4')}
                            ${createFaceHTML(5, 'face-5')}
                            ${createFaceHTML(6, 'face-6')}
                        </div>
                    </div>
                `;
            }
        }

        function createFaceHTML(num, className) {
            const dotPositions = {
                1: [4], 2: [0, 8], 3: [0, 4, 8], 
                4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8]
            };
            let dots = '';
            for (let i = 0; i < 9; i++) {
                dots += dotPositions[num].includes(i) ? '<div class="dot"></div>' : '<div></div>';
            }
            return `<div class="dice-face ${className}">${dots}</div>`;
        }

        function renderEmptyChart(min, max) {
            chartContainer.innerHTML = '';
            labelsContainer.innerHTML = '';
            for (let i = min; i <= max; i++) {
                const bar = document.createElement('div');
                bar.className = 'flex-1 bg-indigo-50 border-t border-x border-indigo-100 rounded-t-sm bar-transition relative';
                bar.id = `bar-${i}`;
                bar.style.height = '0%';
                chartContainer.appendChild(bar);

                const labelCol = document.createElement('div');
                labelCol.className = 'stat-label-col';
                labelCol.innerHTML = `
                    <span class="val-main">${i}</span>
                    <span class="val-freq" id="freq-val-${i}">0</span>
                    <span class="val-pct" id="pct-val-${i}">0%</span>
                `;
                labelsContainer.appendChild(labelCol);
            }
        }

        async function rollSingleBatch() {
            if (!isRunning) return;

            const diceCount = parseInt(numDiceInput.value);
            const targetTotal = parseInt(numRollsInput.value);
            const speed = parseInt(speedInput.value);
            
            const rollsPerFrame = targetTotal > 1000 ? Math.ceil(targetTotal / 40) : (targetTotal > 100 ? 5 : 1);
            
            let lastResults = [];

            for (let r = 0; r < rollsPerFrame && totalRollsDone < targetTotal; r++) {
                let currentSum = 0;
                let results = [];
                for (let d = 0; d < diceCount; d++) {
                    const val = Math.floor(Math.random() * 6) + 1;
                    currentSum += val;
                    results.push(val);
                }
                frequencies[currentSum]++;
                totalRollsDone++;
                lastResults = results;
                
                fullHistoryData.push({
                    index: totalRollsDone,
                    results: [...results],
                    sum: currentSum
                });
                
                if (targetTotal < 200 || totalRollsDone % 5 === 0) {
                    addToHistoryLine(currentSum);
                }
            }

            updateVisualDice(lastResults);
            updateStatsUI();
            updateChart();

            if (totalRollsDone < targetTotal) {
                timer = setTimeout(rollSingleBatch, 1000 / (speed * 4));
            } else {
                finishSimulation();
            }
        }

        function addToHistoryLine(sum) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = sum;
            historyLine.prepend(item);
            
            if (historyLine.childNodes.length > 15) {
                historyLine.removeChild(historyLine.lastChild);
            }
        }

        function updateVisualDice(results) {
            results.forEach((val, i) => {
                const dice = document.getElementById(`dice-${i}`);
                if (!dice) return;
                const rotations = {
                    1: 'rotateX(0deg) rotateY(0deg)',
                    2: 'rotateX(0deg) rotateY(-90deg)',
                    3: 'rotateX(0deg) rotateY(-180deg)',
                    4: 'rotateX(0deg) rotateY(90deg)',
                    5: 'rotateX(-90deg) rotateY(0deg)',
                    6: 'rotateX(90deg) rotateY(0deg)'
                };
                dice.style.transform = rotations[val];
            });
        }

        function updateChart() {
            const maxFreq = Math.max(...Object.values(frequencies), 1);
            const total = totalRollsDone || 1;

            Object.keys(frequencies).forEach(sum => {
                const bar = document.getElementById(`bar-${sum}`);
                const freqLabel = document.getElementById(`freq-val-${sum}`);
                const pctLabel = document.getElementById(`pct-val-${sum}`);
                
                if (bar) {
                    const height = (frequencies[sum] / maxFreq) * 100;
                    bar.style.height = `${height}%`;
                    if (frequencies[sum] > 0) {
                        bar.classList.add('bg-indigo-500');
                        bar.classList.remove('bg-indigo-50');
                    }
                }

                if (freqLabel && pctLabel) {
                    freqLabel.textContent = frequencies[sum];
                    const pct = ((frequencies[sum] / total) * 100).toFixed(1);
                    pctLabel.textContent = `${pct}%`;
                    
                    if (frequencies[sum] > 0) {
                        freqLabel.classList.add('text-indigo-600');
                    }
                }
            });
        }

        function updateStatsUI() {
            const targetTotal = parseInt(numRollsInput.value);
            currentCountDisplay.textContent = totalRollsDone;
            totalTargetDisplay.textContent = targetTotal;
            progressBar.style.width = `${(totalRollsDone / targetTotal) * 100}%`;
        }

        function finishSimulation() {
            isRunning = false;
            btnStart.disabled = false;
            btnStart.textContent = "Novos Dados";
            fullHistorySection.classList.remove('hidden');
            
            const dice = document.querySelectorAll('.dice');
            dice.forEach(d => d.classList.remove('rolling'));
            
            renderFullHistoryTable();
        }

        function renderFullHistoryTable() {
            historyTableBody.innerHTML = '';
            historyCountBadge.textContent = `${fullHistoryData.length} lançamentos`;
            
            const displayLimit = 500;
            const itemsToDisplay = fullHistoryData.slice(-displayLimit).reverse();
            
            itemsToDisplay.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50 transition';
                row.innerHTML = `
                    <td class="py-2 px-4 border-b text-xs text-slate-400">${item.index}</td>
                    <td class="py-2 px-4 border-b text-slate-600 text-sm">[ ${item.results.join(', ')} ]</td>
                    <td class="py-2 px-4 border-b font-bold text-indigo-600 text-sm">${item.sum}</td>
                `;
                historyTableBody.appendChild(row);
            });

            if (fullHistoryData.length > displayLimit) {
                const infoRow = document.createElement('tr');
                infoRow.innerHTML = `<td colspan="3" class="py-3 text-center text-slate-400 italic text-xs">Exibindo apenas os últimos ${displayLimit} registros. Exporte o conjunto completo via CSV.</td>`;
                historyTableBody.appendChild(infoRow);
            }
        }

        function exportToCSV() {
            if (fullHistoryData.length === 0) return;
            let csvContent = "Lancamento,Dados,Soma\n";
            fullHistoryData.forEach(item => {
                const resultsStr = item.results.join(';');
                csvContent += `${item.index},"${resultsStr}",${item.sum}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `historico_dados_${fullHistoryData.length}_lancamentos.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        btnStart.addEventListener('click', () => {
            if (isRunning) return;
            setupSimulation();
            isRunning = true;
            btnStart.disabled = true;
            btnStart.textContent = "Processando";
            statsPanel.classList.remove('hidden');
            
            const dice = document.querySelectorAll('.dice');
            dice.forEach(d => d.classList.add('rolling'));
            
            setTimeout(() => {
                dice.forEach(d => d.classList.remove('rolling'));
                rollSingleBatch();
            }, 400);
        });

        btnReset.addEventListener('click', () => {
            clearTimeout(timer);
            isRunning = false;
            btnStart.disabled = false;
            btnStart.textContent = "Sortear";
            statsPanel.classList.add('hidden');
            setupSimulation();
        });

        btnExport.addEventListener('click', exportToCSV);

        window.addEventListener('load', setupSimulation);
    </script>
</body>
</html>
